{% extends 'store/base.html' %}

{% block content %}
<div class="success-message">
    <h2>Order Confirmed</h2>
    
    <p style="margin: 20px 0; font-size: 16px;">
        Thank you for your purchase, <strong>{{ order.name }}</strong>!
    </p>
    
    <div style="background-color: white; padding: 20px; border-radius: 4px; margin: 20px 0; text-align: left; display: inline-block;">
        <p><strong>Order Details:</strong></p>
        <p>Email: {{ order.email }}</p>
        <p>Shipping Address: {{ order.address }}</p>
    </div>
    
    <p style="margin: 20px 0; color: #666;">
        We'll send you a confirmation email shortly.
    </p>
    
    <a href="{% url 'store:home' %}" class="btn">Back to Home</a>
</div>
{% endblock %}
