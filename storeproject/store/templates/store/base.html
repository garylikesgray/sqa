{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }} - MakeUp ACCESSORIES By Sqabhobho </title>
    <link rel="stylesheet" href="{% static 'store/style.css' %}">
</head>
<body>
    <!-- ===== HEADER ===== -->
    <header>
        <div class="header-content">
            <div class="logo">MakeUp ACCESSORIES By Sqabhobho</div>
            <nav>
                <a href="{% url 'store:home' %}">Home</a>
                <a href="{% url 'store:products' %}">Shop</a>
                <a href="{% url 'store:cart' %}">Cart</a>
            </nav>
        </div>
    </header>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="container">
        {% block content %}
        <!-- Each page puts its own content here -->
        {% endblock %}
    </main>

    <!-- ===== FOOTER ===== -->
    <footer style="text-align: center; padding: 20px; color: #888; border-top: 1px solid #e8d5d5; margin-top: 40px;">
        <p>&copy; 2024 Makeup Store. All rights reserved.</p>
    </footer>
</body>
</html>
